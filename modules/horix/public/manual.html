<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual — Horix</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script nonce="__NONCE__">
  (function() {
    var theme = localStorage.getItem('he_theme');
    if (theme === 'dark') { document.documentElement.classList.add('dark'); }
    else if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #fff;
    --sidebar-bg: #f1f5f9;
    --text: #0f172a;
    --text-secondary: #475569;
    --muted: #94a3b8;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-light: #dbeafe;
    --border: #e2e8f0;
    --code-bg: #1e293b;
    --code-text: #e2e8f0;
    --callout-info: #dbeafe;
    --callout-info-border: #3b82f6;
    --callout-warning: #fef3c7;
    --callout-warning-border: #f59e0b;
    --callout-tip: #d1fae5;
    --callout-tip-border: #10b981;
    --callout-note: #ede9fe;
    --callout-note-border: #8b5cf6;
    --table-stripe: #f8fafc;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 12px;
    --toc-width: 260px;
  }
  html.dark {
    --bg: #0f172a;
    --surface: #1e293b;
    --sidebar-bg: #0f172a;
    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --muted: #64748b;
    --accent: #60a5fa;
    --accent-hover: #93bbfc;
    --accent-light: #1e3a5f;
    --border: #334155;
    --code-bg: #020617;
    --code-text: #e2e8f0;
    --callout-info: #1e3a5f;
    --callout-info-border: #60a5fa;
    --callout-warning: #451a03;
    --callout-warning-border: #fbbf24;
    --callout-tip: #064e3b;
    --callout-tip-border: #34d399;
    --callout-note: #2e1065;
    --callout-note-border: #a78bfa;
    --table-stripe: #1e293b;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 72px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar / TOC ── */
  .toc {
    position: fixed;
    top: 0; left: 0;
    width: var(--toc-width);
    height: 100vh;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    padding: 0;
    overflow-y: auto;
    z-index: 50;
    display: flex;
    flex-direction: column;
  }
  .toc-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .toc-brand {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .toc-brand span { color: var(--accent); }
  .toc-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .toc-search {
    margin: 12px 16px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .toc-search:focus { border-color: var(--accent); }
  .toc-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 20px;
    list-style: none;
  }
  .toc-list li { margin: 0; }
  .toc-list a {
    display: block;
    padding: 6px 20px;
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    border-left: 3px solid transparent;
    transition: all 0.12s;
    line-height: 1.4;
  }
  .toc-list a:hover { color: var(--accent); background: var(--accent-light); }
  .toc-list a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-light);
    font-weight: 600;
  }
  .toc-list .l2 { padding-left: 36px; font-size: 12.5px; }
  .toc-list .l3 { padding-left: 52px; font-size: 12px; color: var(--muted); }
  .toc-toggle {
    display: none;
    position: fixed;
    top: 12px; left: 12px;
    z-index: 60;
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    cursor: pointer;
    font-size: 18px;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }

  /* ── Main content ── */
  .main-wrap {
    margin-left: var(--toc-width);
    flex: 1;
    min-width: 0;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 40;
    box-shadow: var(--shadow);
  }
  .topbar-label { font-size: 13px; color: var(--muted); }
  .topbar-rol {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    background: var(--bg);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .topbar-actions { display: flex; gap: 8px; }
  .topbar-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topbar-btn:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 40px 100px;
  }
  .loading {
    text-align: center;
    padding: 100px 0;
    color: var(--muted);
    font-size: 16px;
  }
  .loading::after {
    content: '';
    display: block;
    width: 28px; height: 28px;
    margin: 16px auto 0;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { text-align: center; padding: 100px 0; font-size: 18px; color: #ef4444; }

  /* ── Headings ── */
  #content h1 {
    font-size: 30px;
    font-weight: 800;
    margin: 40px 0 12px;
    padding-bottom: 14px;
    border-bottom: 3px solid var(--accent);
    letter-spacing: -0.5px;
    line-height: 1.3;
  }
  #content h1:first-of-type { margin-top: 0; font-size: 34px; }
  #content h2 {
    font-size: 22px;
    font-weight: 700;
    margin: 36px 0 10px;
    color: var(--accent);
    line-height: 1.4;
  }
  #content h3 {
    font-size: 17px;
    font-weight: 600;
    margin: 28px 0 6px;
  }
  #content h1 .anchor, #content h2 .anchor, #content h3 .anchor {
    display: none;
  }

  /* ── Paragraphs / Lists ── */
  #content p { margin: 14px 0; }
  #content ul, #content ol { margin: 12px 0; padding-left: 28px; }
  #content li { margin: 5px 0; line-height: 1.7; }
  #content li::marker { color: var(--accent); }

  /* ── Tables ── */
  #content table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 20px 0;
    font-size: 14px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  #content th, #content td {
    padding: 11px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  #content th {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #content tr:last-child td { border-bottom: none; }
  #content tr:nth-child(even) td { background: var(--table-stripe); }
  #content tr:hover td { background: var(--accent-light); }

  /* ── Code ── */
  #content code {
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 0.88em;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
    color: var(--accent);
  }
  .code-wrap {
    position: relative;
    margin: 20px 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.15);
  }
  .code-wrap pre {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 18px 22px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
    margin: 0;
  }
  .code-wrap pre code {
    background: none;
    padding: 0;
    color: inherit;
    font-size: inherit;
  }
  .code-copy {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0;
  }
  .code-wrap:hover .code-copy { opacity: 1; }
  .code-copy:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .code-copy.copied { background: var(--callout-tip-border); color: #fff; }

  /* ── Blockquotes / Callouts ── */
  #content blockquote {
    margin: 20px 0;
    padding: 14px 20px;
    border-radius: 10px;
    border-left: 4px solid var(--accent);
    background: var(--accent-light);
  }
  #content blockquote p { margin: 0; }
  .callout {
    margin: 20px 0;
    padding: 14px 20px;
    border-radius: 10px;
    border-left: 4px solid;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .callout-icon { font-size: 18px; line-height: 1.5; flex-shrink: 0; }
  .callout-body p { margin: 0; }
  .callout-body p + p { margin-top: 8px; }
  .callout-info    { background: var(--callout-info); border-color: var(--callout-info-border); }
  .callout-warning { background: var(--callout-warning); border-color: var(--callout-warning-border); }
  .callout-tip     { background: var(--callout-tip); border-color: var(--callout-tip-border); }
  .callout-note    { background: var(--callout-note); border-color: var(--callout-note-border); }

  /* ── Images ── */
  #content img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    margin: 20px 0;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: zoom-in;
    display: block;
  }
  #content img:hover {
    transform: scale(1.015);
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  .img-caption {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: -12px;
    margin-bottom: 24px;
    font-style: italic;
  }

  /* ── Horizontal rule ── */
  #content hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 40px 0;
  }

  /* ── Strong / Links ── */
  #content strong { color: var(--text); }
  #content a { color: var(--accent); text-decoration: none; font-weight: 500; }
  #content a:hover { text-decoration: underline; }

  /* ── Scroll progress ── */
  .progress {
    position: fixed;
    top: 56px;
    left: var(--toc-width);
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #6366f1);
    z-index: 45;
    transition: width 0.1s;
  }

  /* ── Back to top ── */
  .back-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--muted);
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }
  .back-top.visible { opacity: 1; pointer-events: auto; }
  .back-top:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Image modal ── */
  .img-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    cursor: zoom-out;
  }
  .img-modal.open { opacity: 1; pointer-events: auto; }
  .img-modal img {
    max-width: 95vw;
    max-height: 95vh;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  /* ── Print ── */
  @media print {
    .toc, .topbar, .back-top, .img-modal, .progress, .code-copy { display: none !important; }
    .main-wrap { margin-left: 0; }
    #content img { break-inside: avoid; max-width: 100% !important; }
    #content table { break-inside: avoid; }
    #content h1, #content h2, #content h3 { break-after: avoid; }
    body { font-size: 11pt; line-height: 1.5; color: #000; background: #fff; }
    .container { padding: 20px; max-width: 100%; }
    .callout { break-inside: avoid; }
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    :root { --toc-width: 0px; }
    .toc {
      transform: translateX(-100%);
      transition: transform 0.25s;
      width: 280px;
    }
    .toc.open { transform: translateX(0); }
    .toc-toggle { display: flex; }
    .main-wrap { margin-left: 0; }
    .progress { left: 0; }
    .topbar { padding: 0 16px 0 60px; gap: 8px; }
    .topbar-label { display: none; }
    .container { padding: 28px 18px 80px; }
    #content h1 { font-size: 24px; }
    #content h1:first-of-type { font-size: 26px; }
    #content h2 { font-size: 18px; }
    #content table { font-size: 12px; }
    #content th, #content td { padding: 8px 10px; }
    .back-top { bottom: 20px; right: 20px; width: 38px; height: 38px; font-size: 16px; }
    .topbar-btn span { display: none; }
    #content img { margin: 12px 0; }
  }
</style>
</head>
<body>
<div class="toc" id="toc">
  <div class="toc-header">
    <div class="toc-brand">HORIX<span>.</span></div>
    <div class="toc-sub">Contenido del manual</div>
  </div>
  <input class="toc-search" id="tocSearch" placeholder="🔍 Buscar..." oninput="filtrarTOC(this.value)">
  <ul class="toc-list" id="tocList"></ul>
</div>
<button class="toc-toggle" id="tocToggle" onclick="toggleTOC()">☰</button>
<div class="progress" id="progress"></div>
<div class="main-wrap">
  <div class="topbar">
    <span class="topbar-label">Manual de usuario</span>
    <div class="topbar-rol" id="rol-label"></div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="window.print()">🖨️ <span>Imprimir</span></button>
    </div>
  </div>
  <div class="container" id="content">
    <div class="loading">Cargando manual...</div>
  </div>
</div>
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="img-modal" id="imgModal" onclick="this.classList.remove('open')"><img id="imgModalImg"></div>
<script nonce="__NONCE__">
const params = new URLSearchParams(window.location.search);
const rol = params.get('rol') || 'operador';
document.getElementById('rol-label').textContent = '👤 ' + rol.charAt(0).toUpperCase() + rol.slice(1);

const CALLOUT_MAP = {
  'info':    { icon: 'ℹ️', cls: 'callout-info' },
  'tip':     { icon: '💡', cls: 'callout-tip' },
  'warning': { icon: '⚠️', cls: 'callout-warning' },
  'note':    { icon: '📝', cls: 'callout-note' }
};

fetch('/api/manual/' + rol + '?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('Manual no disponible para este rol'); return r.text(); })
  .then(md => {
    let html = marked.parse(md);
    // Convert screenshot links to images
    html = html.replace(/<a href="(screenshots\/[^"]+)">([^<]+)<\/a>/g, (_, src, alt) => {
      return `<figure><img src="${src}" alt="${alt}" loading="lazy"><figcaption class="img-caption">${alt}</figcaption></figure>`;
    });
    // Convert callout blockquotes: > [!TYPE] text
    html = html.replace(/<blockquote>\s*<p>\[!(\w+)\](.*?)<\/p>\s*<\/blockquote>/gs, (_, type, text) => {
      const t = type.toLowerCase();
      const c = CALLOUT_MAP[t] || CALLOUT_MAP.note;
      return `<div class="callout ${c.cls}"><span class="callout-icon">${c.icon}</span><div class="callout-body"><p>${text.trim()}</p></div></div>`;
    });
    // Wrap code blocks with copy button
    html = html.replace(/<pre><code class="language-(\w+)">([\s\S]*?)<\/code><\/pre>/g, (_, lang, code) => {
      return `<div class="code-wrap"><button class="code-copy" onclick="copyCode(this)">📋 Copiar</button><pre><code class="language-${lang}">${code}</code></pre></div>`;
    });
    html = html.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (_, code) => {
      return `<div class="code-wrap"><button class="code-copy" onclick="copyCode(this)">📋 Copiar</button><pre><code>${code}</code></pre></div>`;
    });
    document.getElementById('content').innerHTML = html;
    // Image click for zoom
    document.querySelectorAll('#content img').forEach(img => {
      img.addEventListener('click', () => {
        document.getElementById('imgModalImg').src = img.src;
        document.getElementById('imgModal').classList.add('open');
      });
    });
    // Build TOC
    construirTOC();
  })
  .catch(e => {
    document.getElementById('content').innerHTML = '<div class="error">❌ ' + e.message + '</div>';
  });

function construirTOC() {
  const toc = document.getElementById('tocList');
  const headings = document.querySelectorAll('#content h1, #content h2, #content h3');
  if (!headings.length) { toc.innerHTML = '<li style="padding:12px 20px;color:var(--muted);font-size:13px;">Sin secciones</li>'; return; }
  let html = '';
  headings.forEach((h, i) => {
    const level = parseInt(h.tagName[1]);
    const text = h.textContent;
    const id = 'sec-' + i;
    h.id = id;
    html += `<li><a class="l${level}" href="#${id}" onclick="toggleTOC(true)">${escHtml(text)}</a></li>`;
  });
  toc.innerHTML = html;
  // Scroll spy
  window.addEventListener('scroll', () => {
    const links = toc.querySelectorAll('a');
    let current = '';
    headings.forEach(h => {
      if (h.getBoundingClientRect().top <= 120) current = h.id;
    });
    links.forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + current);
    });
  });
}

function toggleTOC(close) {
  document.getElementById('toc').classList.toggle('open', !close);
}

function filtrarTOC(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('#tocList a').forEach(a => {
    a.style.display = (!q || a.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

function copyCode(btn) {
  const code = btn.nextElementSibling?.textContent || '';
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✅ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
  document.getElementById('progress').style.width = Math.min(pct, 100) + '%';
  document.getElementById('backTop').classList.toggle('visible', window.scrollY > 400);
});
</script>
</body>
</html>
