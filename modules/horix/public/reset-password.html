<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Restablecer Contraseña — Horix</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0d0f14; --surface:#161a23; --border:#2a3045; --accent:#4f8ef7; --success:#4fbe96; --danger:#f7614f; --text:#e8ecf5; --muted:#7a85a0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 30% 50%, rgba(79,142,247,0.07) 0%, transparent 60%), var(--bg); }
  .box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:44px 40px; width:420px; max-width:95vw; box-shadow:0 24px 80px rgba(0,0,0,0.5); animation:up 0.3s ease; }
  @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:6px; }
  .logo span { color:var(--accent); }
  .subtitle { color:var(--muted); font-size:13px; margin-bottom:28px; }
  .title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; margin-bottom:20px; }
  .msg { border-radius:9px; padding:12px 14px; font-size:13px; margin-bottom:16px; display:none; }
  .msg.show { display:block; }
  .msg.error   { background:rgba(247,97,79,0.1); border:1px solid rgba(247,97,79,0.3); color:var(--danger); }
  .msg.success { background:rgba(79,190,150,0.1); border:1px solid rgba(79,190,150,0.3); color:var(--success); }
  .form-group { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
  label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; }
  input { background:#1e2330; border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; padding:11px 14px; outline:none; width:100%; transition:border 0.2s; letter-spacing:1px; }
  input:focus { border-color:var(--accent); }
  .btn { width:100%; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all 0.18s; margin-top:8px; }
  .btn:hover { background:#3a7bf5; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .back { display:block; text-align:center; margin-top:18px; font-size:13px; color:var(--muted); text-decoration:none; }
  .back:hover { color:var(--text); }
</style>
</head>
<body>
<div class="box">
  <div class="logo">HORIX<span>.</span></div>
  <div class="subtitle">Sistema de Control de Horas Extra · Horix</div>
  <div class="title" id="page-title">Nueva Contraseña</div>
  <div class="msg" id="msg"></div>
  <div id="form-area">
    <div class="form-group">
      <label>Nueva Contraseña</label>
      <input type="password" id="pass1" placeholder="Mínimo 8 caracteres" onkeydown="if(event.key==='Enter')resetear()"/>
    </div>
    <div class="form-group">
      <label>Confirmar Contraseña</label>
      <input type="password" id="pass2" placeholder="Repite la contraseña" onkeydown="if(event.key==='Enter')resetear()"/>
    </div>
    <button class="btn" id="btn-reset" onclick="resetear()">Establecer Nueva Contraseña</button>
  </div>
  <a href="/" class="back">← Volver al inicio de sesión</a>
</div>

<script nonce="__NONCE__">
const token = new URLSearchParams(window.location.search).get('token');

function showMsg(msg, type) {
  const el = document.getElementById('msg');
  el.textContent = msg;
  el.className = `msg show ${type}`;
}

if (!token) {
  showMsg('Enlace inválido. Solicita uno nuevo desde el login.', 'error');
  document.getElementById('form-area').style.display = 'none';
}

async function resetear() {
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;
  if (!pass1 || !pass2)       { showMsg('Completa ambos campos.', 'error'); return; }
  if (pass1.length < 8)       { showMsg('La contraseña debe tener mínimo 8 caracteres.', 'error'); return; }
  if (pass1 !== pass2)        { showMsg('Las contraseñas no coinciden.', 'error'); return; }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true; btn.textContent = 'Procesando...';

  try {
    const res  = await fetch('/api/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass1 })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || 'Error al restablecer.', 'error'); btn.disabled=false; btn.textContent='Establecer Nueva Contraseña'; return; }
    showMsg('✓ Contraseña actualizada. Redirigiendo al login...', 'success');
    document.getElementById('form-area').style.display = 'none';
    setTimeout(() => window.location.href = '/', 2500);
  } catch {
    showMsg('No se pudo conectar al servidor.', 'error');
    btn.disabled=false; btn.textContent='Establecer Nueva Contraseña';
  }
}
</script>
</body>
</html>
