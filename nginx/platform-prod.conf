# ─────────────────────────────────────────────────
# horix-platform — Nginx PROD config
# Path-based routing: /horix/, /docflow/
# ─────────────────────────────────────────────────

server {
    listen 443 ssl;
    http2 on;
    server_name tu-dominio.com;

    ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 50M;

    # Shell
    location / {
        root /opt/horix-platform/shell;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # MCP Gateway + SSO Auth
    location /mcp {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $cookie_platform_jwt";
    }

    # Horix
    location /horix/ {
        rewrite ^/horix(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization "Bearer $cookie_platform_jwt";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        sub_filter '</head>' '<style>#platform-loader{display:flex;align-items:center;justify-content:center;position:fixed;top:0;left:0;width:100%;height:100%;background:#0d0f14;z-index:99999;color:#e8ecf5;font-family:sans-serif;font-size:14px}#platform-loader::after{content:"";width:28px;height:28px;margin-left:12px;border:3px solid #2a3045;border-top-color:#4f8ef7;border-radius:50%;animation:pspin .6s linear infinite}@keyframes pspin{to{transform:rotate(360deg)}}</style><script>fetch=new Proxy(fetch,{apply(t,a,r){r[1]=r[1]||{};r[1].credentials=r[1].credentials||"same-origin";return Reflect.apply(t,a,r)}})</script></head>';
        sub_filter '<body>' '<body><div id="platform-loader">Cargando...</div><script>var _pl=document.getElementById("platform-loader");function _pr(){_pl&&_pl.remove()}setTimeout(_pr,4000);var _pi=setInterval(function(){if(!_pl)clearInterval(_pi);var s=document.getElementById("app-screen");if(s&&(s.classList.contains("show")||s.style.display!=="none")){_pr();clearInterval(_pi)}var a=document.getElementById("app");if(a&&a.style.display!=="none"&&a.style.display!==""){_pr();clearInterval(_pi)}},100);</script>';
        sub_filter_types text/html;
    }

    # DocFlow
    location /docflow/ {
        rewrite ^/docflow(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization "Bearer $cookie_platform_jwt";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        sub_filter '</head>' '<style>#platform-loader{display:flex;align-items:center;justify-content:center;position:fixed;top:0;left:0;width:100%;height:100%;background:#0d0f14;z-index:99999;color:#e8ecf5;font-family:sans-serif;font-size:14px}#platform-loader::after{content:"";width:28px;height:28px;margin-left:12px;border:3px solid #2a3045;border-top-color:#4f8ef7;border-radius:50%;animation:pspin .6s linear infinite}@keyframes pspin{to{transform:rotate(360deg)}}</style><script>(function(){var c=document.cookie.split("; ");for(var i=0;i<c.length;i++){var p=c[i].split("=");if(p[0]==="platform_jwt"){var j=decodeURIComponent(p.slice(1).join("="));if(j&&!localStorage.getItem("vd_t")){localStorage.setItem("vd_t",j)}break;}}})();try{fetch=new Proxy(fetch,{apply(t,a,r){r[1]=r[1]||{};r[1].credentials=r[1].credentials||"same-origin";return Reflect.apply(t,a,r)}})}catch(e){}</script></head>';
        sub_filter '<body>' '<body><div id="platform-loader">Cargando...</div><script>var _pl=document.getElementById("platform-loader");function _pr(){_pl&&_pl.remove()}setTimeout(_pr,4000);var _pi=setInterval(function(){if(!_pl)clearInterval(_pi);var s=document.getElementById("app-screen");if(s&&(s.classList.contains("show")||s.style.display!=="none")){_pr();clearInterval(_pi)}var a=document.getElementById("app");if(a&&a.style.display!=="none"&&a.style.display!==""){_pr();clearInterval(_pi)}},100);</script>';
        sub_filter_types text/html;
    }
}

server {
    listen 80;
    server_name tu-dominio.com;
    return 301 https://$host$request_uri;
}
