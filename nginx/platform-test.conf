# ─────────────────────────────────────────────────
# horix-platform — Nginx TEST config
# Subdominios .dev.local con puertos SSL separados
# ─────────────────────────────────────────────────

# ── SHELL ──
server {
    listen 8443 ssl;
    server_name shell.dev.local;

    ssl_certificate     /etc/ssl/platform/cert.pem;
    ssl_certificate_key /etc/ssl/platform/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 50M;

    location / {
        root /opt/horix-platform/shell;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /mcp {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SSO Auth API (unified login)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $cookie_platform_jwt";
    }

    # Horix (mismo-origen para SSO con cookie)
    location /horix/ {
        rewrite ^/horix(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization "Bearer $cookie_platform_jwt";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        sub_filter '</head>' '<script>fetch=new Proxy(fetch,{apply(t,a,r){r[1]=r[1]||{};r[1].credentials=r[1].credentials||"same-origin";return Reflect.apply(t,a,r)}})</script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # DocFlow (mismo-origen)
    location /docflow/ {
        rewrite ^/docflow(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization "Bearer $cookie_platform_jwt";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        sub_filter '</head>' '<script>fetch=new Proxy(fetch,{apply(t,a,r){r[1]=r[1]||{};r[1].credentials=r[1].credentials||"same-origin";return Reflect.apply(t,a,r)}})</script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}

