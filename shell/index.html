<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14; --surface:#161a23; --surface2:#1e2330; --border:#2a3045;
    --accent:#4f8ef7; --success:#2f855a; --warning:#d69e2e; --danger:#c53030;
    --text:#e8ecf5; --muted:#7a85a0;
    --font:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:var(--font);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background: radial-gradient(ellipse at 20% 50%, rgba(79,142,247,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(247,148,79,0.06) 0%, transparent 50%),
                var(--bg);
  }
  .box{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:44px 40px;width:440px;max-width:95vw;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .logo{font-size:22px;font-weight:800;letter-spacing:-0.2px;margin-bottom:4px;}
  .logo span{color:var(--accent);}
  .sub{color:var(--muted);font-size:13px;margin-bottom:28px;}

  label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
  input{
    width:100%;padding:10px 14px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface2);color:var(--text);font-family:var(--font);font-size:14px;
    outline:none;transition:border-color 0.2s;margin-bottom:16px;
  }
  input:focus{border-color:var(--accent);}

  .btn{
    width:100%;padding:11px;border:none;border-radius:9px;cursor:pointer;
    font-family:var(--font);font-size:14px;font-weight:600;
    background:var(--accent);color:#fff;transition:opacity 0.2s;
  }
  .btn:hover{opacity:0.9;}
  .error{background:rgba(247,97,79,0.1);border:1px solid rgba(247,97,79,0.3);border-radius:9px;padding:11px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none;}
  .error.show{display:block;}

  .grid{
    display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;
  }
  .card{
    background:var(--surface2);border:1px solid var(--border);border-radius:14px;
    padding:28px 20px;text-align:center;cursor:pointer;
    transition:all 0.25s;text-decoration:none;color:var(--text);display:block;
  }
  .card:hover{
    border-color:var(--accent);transform:translateY(-3px);
    box-shadow:0 8px 30px rgba(79,142,247,0.15);
  }
  .card-icon{font-size:36px;margin-bottom:10px;}
  .card-title{font-weight:700;font-size:15px;margin-bottom:4px;}
  .card-desc{font-size:12px;color:var(--muted);}

  .footer{text-align:center;margin-top:32px;font-size:12px;color:var(--muted);}
  .header{margin-bottom:20px;}
  .header .user{font-size:14px;font-weight:600;}
  .header .role{font-size:12px;color:var(--muted);}
  .logout{font-size:12px;color:var(--muted);cursor:pointer;float:right;}
  .logout:hover{color:var(--danger);}

  #login-screen{display:block;}
  #launcher-screen{display:none;}
</style>
</head>
<body>
<div class="box" id="login-screen">
  <div class="logo">&#9889; <span>Plataforma</span></div>
  <div class="sub">Accede a todos los m&oacute;dulos del sistema</div>
  <div class="error" id="login-error"></div>
  <label>Usuario</label>
  <input type="text" id="login-user" placeholder="Correo electrónico" autocomplete="username" autofocus>
  <label>Contraseña</label>
  <input type="password" id="login-pass" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password">
  <button class="btn" id="login-btn" onclick="login()">Ingresar</button>
</div>

<div class="box" id="launcher-screen">
  <div class="header">
    <span class="logout" onclick="logout()">&#10005; Cerrar sesión</span>
    <div class="logo">&#9889; <span>Plataforma</span></div>
    <div class="user" id="launcher-user"></div>
    <div class="role" id="launcher-role"></div>
  </div>
  <div class="grid" id="module-grid">
    <!-- Generated dynamically by app.js -->
  </div>
  <div class="footer">horix-platform</div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
